{% extends 'onlinecourse/base.html' %}

{% block title %}Server Error | Nexly{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="py-5">
        <div class="display-1 fw-black text-danger mb-4">500</div>
        <h2 class="fw-extrabold mb-3">Something Went Wrong</h2>
        <p class="text-muted mb-5">Our servers are having a bit of trouble. We've been notified and are working on it!</p>
        <a href="{% url 'onlinecourse:index' %}" class="btn btn-primary rounded-pill px-5 py-3">Try Again</a>
    </div>
</div>
{% endblock %}
