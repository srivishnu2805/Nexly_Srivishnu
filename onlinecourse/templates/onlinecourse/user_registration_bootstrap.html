{% extends 'onlinecourse/base.html' %}

{% block content %}
<div class="container" style="padding: 100px 0;">
    <div class="auth-container" style="max-width: 500px;">
        <div class="card fade-in">
            <h2 style="text-align:center; font-size: 1.75rem;">Create Account.</h2>
            <p style="text-align:center; color: var(--text-muted); margin-bottom: 32px;">Start your transformation today.</p>

            {% if message %}
                <div style="background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 24px; font-size: 0.85rem; font-weight: 600;">
                    {{ message }}
                </div>
            {% endif %}

            <form action="{% url 'onlinecourse:registration' %}" method="post">
                {% csrf_token %}
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" name="firstname" class="form-control" placeholder="Jane" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="lastname" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="choose_username" required>
                </div>
                <div class="form-group" style="margin-bottom: 32px;">
                    <label class="form-label">Password</label>
                    <input type="password" name="psw" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding: 14px;">Create Nexly Account</button>
            </form>

            <div style="position:relative; margin: 32px 0; text-align:center;">
                <hr style="border:none; border-top: 1px solid var(--border-dark);">
                <span style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background: #fff; padding: 0 16px; font-size: 0.7rem; font-weight: 800; color: var(--text-muted);">OR</span>
            </div>

            {% load socialaccount %}
            <a href="{% provider_login_url 'google' %}" class="btn btn-outline" style="width:100%; gap:12px; padding: 14px; border-radius: 12px; font-weight: 700; border: 1px solid var(--border-dark); transition: all 0.2s; background: white;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" style="width:20px;">
                Continue with Google
            </a>

            <p style="text-align:center; margin-top: 32px; font-size: 0.85rem; color: var(--text-muted);">
                Already have an account? <a href="{% url 'onlinecourse:login' %}" style="color: var(--primary); font-weight: 700; text-decoration:none;">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
